server {
    listen 80;
    server_name localhost;
    
    # Logging for development - detailed format
    access_log /var/log/nginx/access.log detailed;
    error_log /var/log/nginx/error.log debug;
    
    # Health check endpoint (no auth required)
    location /health {
        proxy_pass http://app:8000/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        
        # Log health checks with less detail
        access_log /var/log/nginx/health.log;
    }
    
    # Root endpoint
    location / {
        proxy_pass http://app:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Debug headers
        add_header X-Debug-Location "root" always;
    }
    
    # REST API endpoints
    location /api/ {
        proxy_pass http://app:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Debug headers
        add_header X-Debug-Location "api" always;
    }
    
    # MCP SSE endpoint - CRITICAL for SSE to work properly
    location /mcp/ {
        proxy_pass http://app:8000/mcp/;
        proxy_http_version 1.1;
        
        # SSE specific settings
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $real_ip;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Connection upgrade for SSE
        proxy_set_header Connection '';
        proxy_set_header Cache-Control 'no-cache';
        
        # Disable buffering for SSE
        proxy_buffering off;
        proxy_cache off;
        
        # Timeouts - SSE connections stay open long
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        
        # Special SSE logging
        access_log /var/log/nginx/sse.log sse;
        
        # CORS headers (adjust for production)
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization' always;
        add_header X-Debug-Location "mcp-sse" always;
        
        # Handle preflight requests
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS';
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain; charset=utf-8';
            add_header 'Content-Length' 0;
            return 204;
        }
    }
}

# Log formats
log_format detailed '$time_iso8601 | $request_id | $remote_addr | $request_method $request_uri '
                   '| Status: $status | Size: $bytes_sent | Time: ${request_time}s '
                   '| Upstream: $upstream_addr | Agent: $http_user_agent '
                   '| Forwarded: $http_x_forwarded_for';

log_format sse '$time_iso8601 | SSE | $remote_addr | $request_method $request_uri '
              '| Status: $status | Connection: $connection '
              '| Upstream: $upstream_addr | Time: ${request_time}s';
